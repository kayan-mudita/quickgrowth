    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, Inter, 'Segoe UI', sans-serif;
        background: #0a0a0a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      /* Background effects matching the main site */
      .bg {
        position: fixed; inset: 0; z-index: 0;
      }
      .gradient-mesh {
        position: absolute; inset: 0;
        background:
          radial-gradient(at 27% 37%, rgba(99,102,241,.12) 0px, transparent 50%),
          radial-gradient(at 97% 21%, rgba(16,185,129,.08) 0px, transparent 50%),
          radial-gradient(at 52% 99%, rgba(139,92,246,.1) 0px, transparent 50%);
      }
      .orb {
        position: absolute; border-radius: 50%;
        filter: blur(60px); opacity: .35; pointer-events: none;
      }
      .orb-1 {
        width: 500px; height: 500px;
        background: linear-gradient(45deg, #6366f1, #8b5cf6);
        top: -250px; left: -150px;
      }
      .orb-2 {
        width: 400px; height: 400px;
        background: linear-gradient(45deg, #10b981, #3b82f6);
        bottom: -200px; right: -100px;
      }
      .content {
        position: relative; z-index: 1;
        text-align: center; padding: 24px;
        max-width: 600px;
        animation: fadeInUp .6s ease forwards;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .check-icon {
        width: 72px; height: 72px; margin: 0 auto 28px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(34,197,94,.15), rgba(34,197,94,.05));
        border: 1px solid rgba(34,197,94,.3);
        display: grid; place-items: center;
        font-size: 36px; color: #86efac;
      }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(32px, 6vw, 48px);
        font-weight: 700;
        line-height: 1.15;
        margin-bottom: 16px;
        background: linear-gradient(to right, #fff 20%, #a5b4fc);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        font-size: 18px; line-height: 1.6;
        color: rgba(255,255,255,.7);
        margin-bottom: 36px;
      }
      .back-link {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 14px 32px; font-size: 16px; font-weight: 600;
        color: #fff; text-decoration: none;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(99,102,241,.4);
        transition: all .3s cubic-bezier(.4,0,.2,1);
      }
      .back-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(99,102,241,.6);
      }
