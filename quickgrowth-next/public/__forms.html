<!--
  Netlify Forms detection file — required by @netlify/plugin-nextjs v5+.
  Do NOT remove. Netlify parses this at build time to register the form.
  See: https://opennext.js.org/netlify/forms
-->
<!doctype html>
<html>
  <head></head>
  <body>
    <form name="waitlist" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="waitlist" />
      <input name="bot-field" />
      <input name="first-name" type="text" />
      <input name="last-name" type="text" />
      <input name="email" type="email" />
      <input name="company" type="text" />
      <input name="utm_source" type="hidden" />
      <input name="utm_medium" type="hidden" />
      <input name="utm_campaign" type="hidden" />
      <input name="utm_term" type="hidden" />
      <input name="utm_content" type="hidden" />
    </form>
  </body>
</html>
