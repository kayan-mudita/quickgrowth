<svg xmlns="http://www.w3.org/2000/svg" width="480" height="260" viewBox="0 0 480 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f101f" />
      <stop offset="100%" stop-color="#0b0c17" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <style>
    .panel { fill: url(#bg); stroke: rgba(255, 255, 255, 0.08); }
    .lane { fill: rgba(255, 255, 255, 0.02); stroke: rgba(255, 255, 255, 0.06); }
    .label { fill: rgba(255, 255, 255, 0.75); font-family: "Inter", system-ui, -apple-system, sans-serif; font-size: 12px; letter-spacing: 0.04em; }
    .path { stroke: url(#accent); stroke-width: 3; fill: none; stroke-linecap: round; }
    .node { fill: rgba(255, 255, 255, 0.06); stroke: rgba(255, 255, 255, 0.2); }
    .node text { fill: rgba(255, 255, 255, 0.9); font-family: "Inter", system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; }
    .milestone { fill: rgba(99, 102, 241, 0.16); stroke: rgba(99, 102, 241, 0.5); }
    .milestone text { fill: rgba(255, 255, 255, 0.9); font-family: "Inter", system-ui, -apple-system, sans-serif; font-size: 11px; }
    .dot { fill: url(#accent); opacity: 0.9; }
  </style>

  <rect x="10" y="10" width="460" height="240" rx="18" class="panel" />

  <rect x="28" y="40" width="424" height="190" rx="14" class="lane" />
  <text x="40" y="60" class="label">Pipeline Growth</text>

  <path class="path" d="M60 190 C130 170 180 150 230 130 C280 110 330 90 400 70" />

  <circle class="dot" cx="90" cy="178" r="4" />
  <circle class="dot" cx="170" cy="152" r="4" />
  <circle class="dot" cx="250" cy="126" r="4" />
  <circle class="dot" cx="320" cy="102" r="4" />
  <circle class="dot" cx="390" cy="76" r="4" />

  <g>
    <rect class="milestone" x="70" y="96" width="70" height="28" rx="9" />
    <text x="105" y="114" text-anchor="middle">Stage 1</text>
  </g>
  <g>
    <rect class="milestone" x="190" y="76" width="70" height="28" rx="9" />
    <text x="225" y="94" text-anchor="middle">Stage 2</text>
  </g>
  <g>
    <rect class="milestone" x="310" y="56" width="70" height="28" rx="9" />
    <text x="345" y="74" text-anchor="middle">Stage 3</text>
  </g>

  <g>
    <rect class="node" x="80" y="190" width="60" height="28" rx="8" />
    <text x="110" y="208" text-anchor="middle">New</text>
  </g>
  <g>
    <rect class="node" x="210" y="168" width="60" height="28" rx="8" />
    <text x="240" y="186" text-anchor="middle">Active</text>
  </g>
  <g>
    <rect class="node" x="350" y="134" width="60" height="28" rx="8" />
    <text x="380" y="152" text-anchor="middle">Win</text>
  </g>
</svg>
