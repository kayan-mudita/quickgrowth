  </g>
  <g>
    <rect class="node" x="50" y="136" width="96" height="30" rx="8" />
    <text x="98" y="155" text-anchor="middle">Forms</text>
  </g>
  <g>
    <rect class="node" x="50" y="176" width="96" height="30" rx="8" />
    <text x="98" y="195" text-anchor="middle">CRM</text>
  </g>

  <g>
