<svg xmlns="http://www.w3.org/2000/svg" width="480" height="260" viewBox="0 0 480 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f101f" />
      <stop offset="100%" stop-color="#0b0c17" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <style>
    .panel { fill: url(#bg); stroke: rgba(255, 255, 255, 0.08); }
    .lane { fill: rgba(255, 255, 255, 0.02); stroke: rgba(255, 255, 255, 0.06); }
    .label { fill: rgba(255, 255, 255, 0.75); font-family: "Inter", system-ui, -apple-system, sans-serif; font-size: 12px; letter-spacing: 0.04em; }
    .path { stroke: url(#accent); stroke-width: 3; fill: none; stroke-linecap: round; opacity: 0.85; }
    .node { fill: rgba(255, 255, 255, 0.06); stroke: rgba(255, 255, 255, 0.2); }
    .node text { fill: rgba(255, 255, 255, 0.9); font-family: "Inter", system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; }
    .chip { fill: rgba(99, 102, 241, 0.16); stroke: rgba(99, 102, 241, 0.5); }
    .chip text { fill: rgba(255, 255, 255, 0.9); font-family: "Inter", system-ui, -apple-system, sans-serif; font-size: 11px; }
    .dot { fill: url(#accent); opacity: 0.9; }
  </style>

  <rect x="10" y="10" width="460" height="240" rx="18" class="panel" />

  <rect x="28" y="50" width="140" height="180" rx="14" class="lane" />
